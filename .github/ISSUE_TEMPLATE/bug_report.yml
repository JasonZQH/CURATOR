name: Bug report
description: Report something in Curator that behaves incorrectly.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please do not report security vulnerabilities here — see
        [SECURITY.md](https://github.com/JasonZQH/CURATOR/blob/dev/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you observe, and what did you expect instead?
      placeholder: The writer paused with … but I expected …
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands / shell input, ideally from `curator init` onward.
      placeholder: |
        1. curator init --yes
        2. /agent bind writer.default claude-code
        3. > add a --json flag …
        4. …
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider(s) involved
      multiple: true
      options:
        - Claude Code
        - Codex
        - Not provider-specific
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Curator version
      description: Output of `curator --version`.
      placeholder: curator 0.1.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: macOS 15.3 (arm64) · Ubuntu 24.04 · WSL2
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: "`curator doctor` output"
      description: Paste the readiness/environment check. Redact anything sensitive.
      render: shell
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or ledger output
      description: Any error text, or relevant `/evidence` / `/history` output. Redact secrets.
      render: shell
    validations:
      required: false
