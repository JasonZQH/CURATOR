name: Feature request
description: Suggest a capability or improvement for Curator.
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Curator v0.1.0 is Phase 0 — local, single-writer, sequential. Some ideas may already be
        on the [roadmap](https://github.com/JasonZQH/CURATOR/blob/dev/README.md#versions) (V1.1–V1.6); a pointer there is welcome
        but not required.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The pain or gap you hit — ideally the multi-provider / control-plane situation it comes from.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like Curator to do. Command/flag/flow sketches help.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, or how you work around it today.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I understand this may land on the roadmap rather than immediately, and that Phase 0 is deliberately narrow.
          required: true
