name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"

jobs:
  guard:
    name: Guard — no committed state or mock provider
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Assert no committed Curator state or SQLite ledgers
        run: |
          set -euo pipefail
          bad="$(git ls-files | grep -E '(^|/)\.curator/|\.sqlite$|\.sqlite3$' || true)"
          if [ -n "$bad" ]; then
            echo "::error::Local Curator state / SQLite ledgers must never be committed (seed/mock runtime data):"
            echo "$bad"
            exit 1
          fi
          echo "OK: no committed .curator/ state or *.sqlite ledgers."
      - name: Assert shipping code defines no synthetic provider
        run: |
          set -euo pipefail
          bad="$(grep -rnE 'class[[:space:]]+[A-Za-z_]*(Mock|Fake|Stub|Synthetic|Dummy)[A-Za-z_]*(Provider|Driver)\b' src/ || true)"
          if [ -n "$bad" ]; then
            echo "::error::Shipping code must not define a synthetic/mock provider (no fallback theater):"
            echo "$bad"
            exit 1
          fi
          echo "OK: no synthetic provider in src/."

  test:
    name: Python tests and lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest -p no:cacheprovider -q

      - name: Run Ruff
        run: |
          source .venv/bin/activate
          ruff check src tests

  macos:
    name: macOS smoke
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install and smoke test
        run: |
          uv sync --dev
          uv run curator --version
          uv run pytest -p no:cacheprovider -q

  release-smoke:
    name: Build, clean-install smoke, and publish artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [guard, test, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Build distributions
        run: |
          uv sync --dev
          uv build
      - name: Install wheel in a clean environment
        run: |
          python -m venv /tmp/curator-wheel-smoke
          /tmp/curator-wheel-smoke/bin/pip install dist/*.whl
          /tmp/curator-wheel-smoke/bin/curator --version
      - name: Install sdist in a clean environment
        run: |
          python -m venv /tmp/curator-sdist-smoke
          /tmp/curator-sdist-smoke/bin/pip install dist/*.tar.gz
          /tmp/curator-sdist-smoke/bin/curator --version
      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./*.whl ./*.tar.gz > SHA256SUMS
          cat SHA256SUMS
      - name: Publish build artifacts to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" \
            dist/*.whl dist/*.tar.gz dist/SHA256SUMS --clobber
