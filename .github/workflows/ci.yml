name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"

jobs:
  test:
    name: Python tests and lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest -p no:cacheprovider -q

      - name: Run Ruff
        run: |
          source .venv/bin/activate
          ruff check src tests

  macos:
    name: macOS smoke
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install and smoke test
        run: |
          uv sync --dev
          uv run curator --version
          uv run pytest -p no:cacheprovider -q

  release-smoke:
    name: Build and clean-install smoke
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Build distributions
        run: |
          uv sync --dev
          uv build
      - name: Install wheel in a clean environment
        run: |
          python -m venv /tmp/curator-wheel-smoke
          /tmp/curator-wheel-smoke/bin/pip install dist/*.whl
          /tmp/curator-wheel-smoke/bin/curator --version
      - name: Install sdist in a clean environment
        run: |
          python -m venv /tmp/curator-sdist-smoke
          /tmp/curator-sdist-smoke/bin/pip install dist/*.tar.gz
          /tmp/curator-sdist-smoke/bin/curator --version
